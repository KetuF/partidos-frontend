<div class="inicio-wrapper">

  <div class="temporada-badge">
    <span class="dot-verde"></span>
    Temporada 2026
  </div>

  <div class="hero">
    <div class="logo-container">
      <img src="assets/LogoPartidosBlanco.png" alt="LogoPartidosBlanco">
    </div>
    <p class="hero-texto">
      Resultados, posiciones y toda la información de la <strong>Liga de Veteranos</strong> al alcance de tu mano.
    </p>
  </div>

  <section class="splide">
    <div class="splide__track" style="padding: 2rem">
      <ul class="splide__list">
        @for (categoria of categorias; track categoria.id) {
          <li class="splide__slide">
            <div class="card" (click)="IrACategoria(categoria.id)">
              <div class="card-inner" [style.background]="
                  'linear-gradient(
                    180deg,
                    rgba(2,12,32,.96) 0%,
                    rgba(7,20,46,.52) 40%,
                    rgba(13,27,42,1) 100%
                  ),
                  url(' + GetFondoCategoria(categoria.nombre) + ')'
                ">
                <span class="card-nombre">{{ categoria.nombre }}</span>
                <p class="card-textoC">Ver resultados, posiciones y más</p>
                <div class="card-arrow">→</div>
              </div>
            </div>
          </li>
        }
      </ul>
    </div>
  </section>
</div>
