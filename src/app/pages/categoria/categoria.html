<app-navbar [categoriaActual]="categoria?.nombre || ''"></app-navbar>

<div class="categoria-wrapper">

  <div class="categorias-nav">
    <button
      class="nav-item"
      [class.active]="activeSection === 'posiciones'"
      (click)="scrollTo('posiciones')">
      Posiciones
    </button>

    <button
      class="nav-item"
      [class.active]="activeSection === 'fixture'"
      (click)="scrollTo('fixture')">
      Fixture
    </button>

    <button
      class="nav-item"
      [class.active]="activeSection === 'goleadores'"
      (click)="scrollTo('goleadores')">
      Goleadores
    </button>

    <button
      class="nav-item"
      [class.active]="activeSection === 'sanciones'"
      (click)="scrollTo('sanciones')">
      Sanciones
    </button>

    <!-- <button
      class="nav-item"
      [class.active]="activeSection === 'arqueros'"
      (click)="scrollTo('arqueros')">
      Arqueros
    </button> -->
  </div>

  <section id="posiciones">
    <app-tabla-posiciones [partidos]="partidos" [equipos]="equipos"></app-tabla-posiciones>
  </section>

  <div class="banner-publicidad">
    <span>PUBLICIDAD</span>
  </div>

  <section id="fixture">
    <app-fixture [partidos]="partidos"></app-fixture>
  </section>

  <div class="banner-publicidad">
    <span>PUBLICIDAD</span>
  </div>

  <section id="goleadores">
    <app-tabla-goleadores [goleadores]="goleadores"></app-tabla-goleadores>
  </section>

  <div class="banner-publicidad">
    <span>PUBLICIDAD</span>
  </div>

  <section id="sanciones">
    <app-tabla-sanciones [sanciones]="sanciones"></app-tabla-sanciones>
  </section>

  <section id="arqueros">
    <app-tabla-valla-menos-vencida [partidos]="partidos" [equipos]="equipos"></app-tabla-valla-menos-vencida>
  </section>

</div>
<app-footer></app-footer>
